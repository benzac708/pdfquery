jenkins:
  systemMessage: "CCEP-RAG CI/CD — Jenkins as Code\n"
  numExecutors: 2
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          name: "Admin"
          password: ${JENKINS_ADMIN_PASSWORD}

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: GHCR_TOKEN
              scope: GLOBAL
              secret: ${GHCR_TOKEN}
              description: "GitHub Container Registry token"
          - usernamePassword:
              id: github-token
              scope: GLOBAL
              username: benzac708
              password: ${GH_TOKEN}
              description: "GitHub API token for cloning and webhooks"

jobs:
  - script: >
      pipelineJob('pdfquery') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/benzac708/pdfquery.git')
                  credentials('github-token')
                }
                branches('main')
                scriptPath('Jenkinsfile')
              }
            }
            lightweight()
          }
        }
        triggers {
          cron('* * * * *')
        }
      }

unclassified:
  location:
    url: http://localhost:8080
